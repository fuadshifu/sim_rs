{% extends "layouts/base.html" %}

{% block title %}Edit Pasien - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil-square"></i> Edit Data Pasien</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('pasien.edit', id=pasien.id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="nik" class="form-label">NIK <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nik" name="nik" value="{{ pasien.nik }}" required maxlength="20">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="nama_lengkap" class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nama_lengkap" name="nama_lengkap" value="{{ pasien.nama_lengkap }}" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="tanggal_lahir" class="form-label">Tanggal Lahir <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="tanggal_lahir" name="tanggal_lahir" value="{{ pasien.tanggal_lahir.strftime('%Y-%m-%d') }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="jenis_kelamin" class="form-label">Jenis Kelamin <span class="text-danger">*</span></label>
                        <select class="form-select" id="jenis_kelamin" name="jenis_kelamin" required>
                            <option value="L" {% if pasien.jenis_kelamin == 'L' %}selected{% endif %}>Laki-laki</option>
                            <option value="P" {% if pasien.jenis_kelamin == 'P' %}selected{% endif %}>Perempuan</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="alamat" class="form-label">Alamat</label>
                <textarea class="form-control" id="alamat" name="alamat" rows="2">{{ pasien.alamat or '' }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="no_telepon" class="form-label">No. Telepon</label>
                        <input type="text" class="form-control" id="no_telepon" name="no_telepon" value="{{ pasien.no_telepon or '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="goldarah" class="form-label">Golongan Darah</label>
                        <select class="form-select" id="goldarah" name="goldarah">
                            <option value="">Pilih...</option>
                            <option value="A" {% if pasien.goldarah == 'A' %}selected{% endif %}>A</option>
                            <option value="B" {% if pasien.goldarah == 'B' %}selected{% endif %}>B</option>
                            <option value="AB" {% if pasien.goldarah == 'AB' %}selected{% endif %}>AB</option>
                            <option value="O" {% if pasien.goldarah == 'O' %}selected{% endif %}>O</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr>
            <h6 class="mb-3">Keluarga Terdekat (Kontak Darurat)</h6>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="nama_keluarga" class="form-label">Nama Keluarga</label>
                        <input type="text" class="form-control" id="nama_keluarga" name="nama_keluarga" value="{{ pasien.nama_keluarga or '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="no_keluarga" class="form-label">No. Telepon Keluarga</label>
                        <input type="text" class="form-control" id="no_keluarga" name="no_keluarga" value="{{ pasien.no_keluarga or '' }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="alergiobat" class="form-label">Alergi Obat</label>
                <textarea class="form-control" id="alergiobat" name="alergiobat" rows="2">{{ pasien.alergiobat or '' }}</textarea>
            </div>

            <hr>
            <h6 class="mb-3"><i class="bi bi-credit-card"></i> Informasi BPJS</h6>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="no_bpjs" class="form-label">No. Kartu BPJS</label>
                        <input type="text" class="form-control" id="no_bpjs" name="no_bpjs" value="{{ pasien.no_bpjs or '' }}" placeholder="Contoh: 0001234567890">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="kelas_bpjs" class="form-label">Kelas</label>
                        <select class="form-select" id="kelas_bpjs" name="kelas_bpjs">
                            <option value="">Pilih...</option>
                            <option value="Kelas 1" {% if pasien.kelas_bpjs == 'Kelas 1' %}selected{% endif %}>Kelas 1</option>
                            <option value="Kelas 2" {% if pasien.kelas_bpjs == 'Kelas 2' %}selected{% endif %}>Kelas 2</option>
                            <option value="Kelas 3" {% if pasien.kelas_bpjs == 'Kelas 3' %}selected{% endif %}>Kelas 3</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="status_bpjs" class="form-label">Status Kepesertaan</label>
                        <select class="form-select" id="status_bpjs" name="status_bpjs">
                            <option value="aktif" {% if pasien.status_bpjs == 'aktif' %}selected{% endif %}>Aktif</option>
                            <option value="nonaktif" {% if pasien.status_bpjs == 'nonaktif' %}selected{% endif %}>Nonaktif</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="faskes_tingkat_1" class="form-label">Faskes Rujukan Tingkat 1</label>
                <input type="text" class="form-control" id="faskes_tingkat_1" name="faskes_tingkat_1" value="{{ pasien.faskes_tingkat_1 or '' }}" placeholder="Nama Faskes Tingkat 1">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Simpan Perubahan
                </button>
                <a href="{{ url_for('pasien.detail', id=pasien.id) }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
