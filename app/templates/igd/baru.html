{% extends "layouts/base.html" %}

{% block title %}Pasien IGD Baru - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-exclamation-triangle"></i> Pendaftaran IGD</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('igd.baru') }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="pasien_id" class="form-label">Pilih Pasien <span class="text-danger">*</span></label>
                        <select class="form-select" id="pasien_id" name="pasien_id" required>
                            <option value="">Pilih Pasien...</option>
                            {% for pasien in pasien_list %}
                            <option value="{{ pasien.id }}">{{ pasien.nik }} - {{ pasien.nama_lengkap }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="triage" class="form-label">Triage <span class="text-danger">*</span></label>
                        <select class="form-select" id="triage" name="triage" required>
                            <option value="">Pilih Triage...</option>
                            <option value="merah">MERAH - Emergent (Gawat Darurat)</option>
                            <option value="kuning">KUNING - Urgent (Mendesak)</option>
                            <option value="hijau">HIJAU - Stable (Dapat Menunggu)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="keluhan_utama" class="form-label">Keluhan Utama / Kondisi Awal</label>
                <textarea class="form-control" id="keluhan_utama" name="keluhan_utama" rows="3" placeholder="Keluhan utama saat masuk IGD..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-check-circle"></i> Daftar ke IGD
                </button>
                <a href="{{ url_for('igd.index') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
