{% extends "layouts/base.html" %}

{% block title %}Daftar Rawat Jalan - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> Daftar Rawat Jalan</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('rawat_jalan.baru') }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="pasien_id" class="form-label">Pilih Pasien <span class="text-danger">*</span></label>
                        <select class="form-select" id="pasien_id" name="pasien_id" required>
                            <option value="">Pilih Pasien...</option>
                            {% for pasien in pasien_list %}
                            <option value="{{ pasien.id }}">{{ pasien.nik }} - {{ pasien.nama_lengkap }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="poliklinik_id" class="form-label">Poliklinik <span class="text-danger">*</span></label>
                        <select class="form-select" id="poliklinik_id" name="poliklinik_id" required>
                            <option value="">Pilih Poliklinik...</option>
                            {% for poliklinik in poliklinik_list %}
                            <option value="{{ poliklinik.id }}">{{ poliklinik.nama }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="keluhan" class="form-label">Keluhan / Riwayat Penyakit</label>
                <textarea class="form-control" id="keluhan" name="keluhan" rows="3" placeholder="Keluhan utama pasien..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Daftar ke Antrian
                </button>
                <a href="{{ url_for('rawat_jalan.index') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
