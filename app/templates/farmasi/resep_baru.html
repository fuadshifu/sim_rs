{% extends "layouts/base.html" %}

{% block title %}Resep Baru - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-prescription2"></i> Resep Baru</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('farmasi.resep_baru') }}" id="resepForm">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="pasien_id" class="form-label">Pasien <span class="text-danger">*</span></label>
                        <select class="form-select" id="pasien_id" name="pasien_id" required>
                            <option value="">Pilih Pasien...</option>
                            {% for pasien in pasien_list %}
                            <option value="{{ pasien.id }}">{{ pasien.nik }} - {{ pasien.nama_lengkap }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <hr>
            <h5 class="mb-3">Obat</h5>

            <div id="obat-container">
                <div class="row mb-3 obat-row">
                    <div class="col-md-5">
                        <select class="form-select" name="obat_id[]" required>
                            <option value="">Pilih Obat...</option>
                            {% for obat in obat_list %}
                            <option value="{{ obat.id }}" data-stok="{{ obat.stok }}">{{ obat.nama }} ({{ obat.stok }} {{ obat.satuan }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" name="jumlah[]" placeholder="Jumlah" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="dosis[]" placeholder="Dosis (contoh: 3x1)">
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-danger" onclick="removeObat(this)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-secondary mb-3" onclick="addObat()">
                <i class="bi bi-plus"></i> Tambah Obat
            </button>

            <div class="mb-3">
                <label for="catatan" class="form-label">Catatan</label>
                <textarea class="form-control" id="catatan" name="catatan" rows="2" placeholder="Catatan untuk apoteker..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Simpan Resep
                </button>
                <a href="{{ url_for('farmasi.resep') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function addObat() {
    const container = document.getElementById('obat-container');
    const newRow = document.createElement('div');
    newRow.className = 'row mb-3 obat-row';
    newRow.innerHTML = `
        <div class="col-md-5">
            <select class="form-select" name="obat_id[]" required>
                <option value="">Pilih Obat...</option>
                {% for obat in obat_list %}
                <option value="{{ obat.id }}" data-stok="{{ obat.stok }}">{{ obat.nama }} ({{ obat.stok }} {{ obat.satuan }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control" name="jumlah[]" placeholder="Jumlah" min="1" required>
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" name="dosis[]" placeholder="Dosis (contoh: 3x1)">
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger" onclick="removeObat(this)">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `;
    container.appendChild(newRow);
}

function removeObat(btn) {
    const rows = document.querySelectorAll('.obat-row');
    if (rows.length > 1) {
        btn.closest('.obat-row').remove();
    }
}
</script>
{% endblock %}
