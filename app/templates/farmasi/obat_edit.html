{% extends "layouts/base.html" %}

{% block title %}Edit Obat - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil"></i> Edit Obat</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('farmasi.obat_edit', id=obat.id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama Obat <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nama" name="nama" value="{{ obat.nama }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="kode" class="form-label">Kode</label>
                        <input type="text" class="form-control" id="kode" name="kode" value="{{ obat.kode or '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="jenis" class="form-label">Jenis</label>
                        <select class="form-select" id="jenis" name="jenis">
                            <option value="">Pilih...</option>
                            <option value="Tablet" {% if obat.jenis == 'Tablet' %}selected{% endif %}>Tablet</option>
                            <option value="Kapsul" {% if obat.jenis == 'Kapsul' %}selected{% endif %}>Kapsul</option>
                            <option value="Sirup" {% if obat.jenis == 'Sirup' %}selected{% endif %}>Sirup</option>
                            <option value="Injeksi" {% if obat.jenis == 'Injeksi' %}selected{% endif %}>Injeksi</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="dosis" class="form-label">Dosis</label>
                        <input type="text" class="form-control" id="dosis" name="dosis" value="{{ obat.dosis or '' }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="satuan" class="form-label">Satuan</label>
                        <input type="text" class="form-control" id="satuan" name="satuan" value="{{ obat.satuan or '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="stok" class="form-label">Stok</label>
                        <input type="number" class="form-control" id="stok" name="stok" value="{{ obat.stok }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="stok_minimum" class="form-label">Stok Minimum</label>
                        <input type="number" class="form-control" id="stok_minimum" name="stok_minimum" value="{{ obat.stok_minimum }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="harga" class="form-label">Harga (Rp)</label>
                        <input type="number" class="form-control" id="harga" name="harga" value="{{ obat.harga }}">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Simpan
                </button>
                <a href="{{ url_for('farmasi.obat') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
