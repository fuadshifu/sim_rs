{% extends "layouts/base.html" %}

{% block title %}RL 1 - Pendaftaran Pasien{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h3><i class="bi bi-file-earmark-text"></i> RL 1 - Data Pendaftaran Pasien</h3>
        <hr>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <form method="GET" class="d-flex">
            <select name="bulan" class="form-select me-2">
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if m == bulan %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
            <select name="tahun" class="form-select me-2">
                {% for y in range(2020, 2030) %}
                <option value="{{ y }}" {% if y == tahun %}selected{% endif %}>{{ y }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">Filter</button>
        </form>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Jenis Layanan</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Pasien Baru</td>
                    <td><strong>{{ pasien_baru }}</strong></td>
                </tr>
                <tr>
                    <td>Rawat Jalan Baru</td>
                    <td><strong>{{ rj_baru }}</strong></td>
                </tr>
                <tr>
                    <td>Rawat Inap Baru</td>
                    <td><strong>{{ ri_baru }}</strong></td>
                </tr>
                <tr>
                    <td>IGD Baru</td>
                    <td><strong>{{ igd_baru }}</strong></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
