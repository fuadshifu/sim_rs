{% extends "layouts/base.html" %}

{% block title %}RL 3 - Kematian{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h3><i class="bi bi-file-earmark-text"></i> RL 3 - Data Kematian</h3>
        <hr>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <form method="GET" class="d-flex">
            <select name="bulan" class="form-select me-2">
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if m == bulan %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
            <select name="tahun" class="form-select me-2">
                {% for y in range(2020, 2030) %}
                <option value="{{ y }}" {% if y == tahun %}selected{% endif %}>{{ y }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">Filter</button>
        </form>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Lokasi</th>
                    <th>Jumlah Kematian</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Rawat Inap</td>
                    <td><strong>{{ mati_inap }}</strong></td>
                </tr>
                <tr>
                    <td>IGD</td>
                    <td><strong>{{ mati_igd }}</strong></td>
                </tr>
                <tr class="table-danger">
                    <th>Total</th>
                    <th><strong>{{ total_kematian }}</strong></th>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
