{% extends "layouts/base.html" %}

{% block title %}Laporan Pneumonia{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h3><i class="bi bi-file-earmark-text"></i> Laporan Pneumonia</h3>
        <hr>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <form method="GET" class="d-flex">
            <select name="bulan" class="form-select me-2">
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if m == bulan %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
            <select name="tahun" class="form-select me-2">
                {% for y in range(2020, 2030) %}
                <option value="{{ y }}" {% if y == tahun %}selected{% endif %}>{{ y }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">Filter</button>
        </form>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card bg-info">
            <div class="card-body">
                <h4 class="card-title">Kasus Pneumonia</h4>
                <h2 class="card-text">{{ pneumonia_cases }}</h2>
            </div>
        </div>
    </div>
</div>
{% endblock %}
