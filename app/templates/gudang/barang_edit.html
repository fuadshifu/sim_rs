{% extends "layouts/base.html" %}

{% block title %}Edit Barang - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil"></i> Edit Barang</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Nama Barang</label>
                        <input type="text" class="form-control" name="nama" value="{{ barang.nama }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Kode</label>
                        <input type="text" class="form-control" name="kode" value="{{ barang.kode or '' }}">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Kategori</label>
                        <select class="form-select" name="kategori_id">
                            <option value="">Pilih...</option>
                            {% for k in kategori_list %}
                            <option value="{{ k.id }}" {% if barang.kategori_id == k.id %}selected{% endif %}>{{ k.nama }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Jenis</label>
                        <select class="form-select" name="jenis">
                            <option value="Medis" {% if barang.jenis == 'Medis' %}selected{% endif %}>Medis</option>
                            <option value="Non-Medis" {% if barang.jenis == 'Non-Medis' %}selected{% endif %}>Non-Medis</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Stok Minimum</label>
                        <input type="number" class="form-control" name="stok_minimum" value="{{ barang.stok_minimum }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Satuan</label>
                        <input type="text" class="form-control" name="satuan" value="{{ barang.satuan or '' }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Harga Satuan</label>
                        <input type="number" class="form-control" name="harga_satuan" value="{{ barang.harga_satuan }}">
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a href="{{ url_for('gudang.index') }}" class="btn btn-secondary">Kembali</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
