{% extends "layouts/base.html" %}

{% block title %}Kategori Baru - SIM RS{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> Tambah Kategori</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nama Kategori</label>
                <input type="text" class="form-control" name="nama" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Kode</label>
                <input type="text" class="form-control" name="kode">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a href="{{ url_for('gudang.kategori') }}" class="btn btn-secondary">Kembali</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
