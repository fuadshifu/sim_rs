{% extends "layouts/base.html" %}

{% block title %}Kategori Barang - SIM RS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags"></i> Kategori Barang</h2>
    <a href="{{ url_for('gudang.kategori_baru') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Tambah
    </a>
</div>

<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Kode</th>
                    <th>Nama Kategori</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for k in kategori_list %}
                <tr>
                    <td>{{ k.kode or '-' }}</td>
                    <td>{{ k.nama }}</td>
                    <td>
                        <a href="{{ url_for('gudang.kategori_edit', id=k.id) }}" class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center text-muted">Tidak ada kategori</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
